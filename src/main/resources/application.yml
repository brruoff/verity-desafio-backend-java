spring:
  datasource:
    url: jdbc:h2:mem:agendamento;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
info:
  app:
    name: ${spring.application.name:agendamento-service}
    description: Microserviço de gestão de agendamentos domiciliares
agendamento:
  kafka:
    topico-criado: agendamento-criado
